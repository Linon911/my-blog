<!-- Google Fonts: Instrument Serif + DM Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:        #f8f7f4;
  --surface:   #ffffff;
  --ink:       #0d0d0d;
  --muted:     #6b6b6b;
  --subtle:    #e8e5e0;
  --accent:    #1a1a2e;
  --accent2:   #c8a96e;
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 28px;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;
  --max-w:     1160px;
  --section-gap: 100px;
}

/* ═══════════════════════════════════════════
   BASE RESET
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   NAVBAR OVERRIDE
═══════════════════════════════════════════ */
#top-link { display: none; }

.nav {
  background: rgba(248,247,244,0.85) !important;
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--subtle);
  padding: 0 !important;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav .logo,
.nav .logo a {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  letter-spacing: -0.01em;
  color: var(--ink) !important;
  text-decoration: none;
}

.nav .menu a {
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: var(--muted) !important;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.2s;
}

.nav .menu a:hover { color: var(--ink) !important; }

/* ═══════════════════════════════════════════
   HOME CONTAINER
═══════════════════════════════════════════ */
.home-container {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 40px;
}

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero {
  padding: 80px 0 100px;
}

.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 56px;
}

.eyebrow-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent2);
  display: inline-block;
  animation: pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.5; transform: scale(0.8); }
}

.hero-body {
  display: grid;
  grid-template-columns: 1fr 0.72fr;
  gap: 48px;
  align-items: start;
}

/* Left */
.hero-name {
  font-family: var(--font-serif);
  font-size: clamp(4rem, 8vw, 7rem);
  line-height: 0.9;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-bottom: 28px;
}

.hero-name-accent { color: var(--accent2); }

.hero-tagline {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(1.1rem, 1.8vw, 1.35rem);
  line-height: 1.55;
  color: var(--muted);
  margin-bottom: 28px;
  max-width: 440px;
}

.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 0;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 40px;
}

.hero-meta .sep { margin: 0 10px; opacity: 0.4; }

.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn-primary {
  background: var(--ink);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  text-decoration: none !important;
  transition: background 0.2s, transform 0.15s;
}
.btn-primary:hover { background: #2a2a2a; transform: translateY(-1px); }

.btn-ghost {
  color: var(--ink) !important;
  border: 1px solid var(--subtle);
  background: var(--surface);
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 400;
  text-decoration: none !important;
  transition: border-color 0.2s, transform 0.15s;
}
.btn-ghost:hover { border-color: #bbb; transform: translateY(-1px); }

/* Right */
.hero-right {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.focus-card {
  background: var(--accent);
  color: #fff;
  padding: 40px;
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
}

.focus-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(200,169,110,0.12);
  pointer-events: none;
}

.focus-label {
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 14px;
}

.focus-title {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  line-height: 1.25;
  margin-bottom: 16px;
}

.focus-desc {
  font-size: 0.88rem;
  line-height: 1.7;
  opacity: 0.72;
  margin-bottom: 24px;
}

.focus-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.focus-tags span {
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 10px;
  border-radius: 100px;
  opacity: 0.8;
}

.stat-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  background: var(--surface);
  border: 1px solid var(--subtle);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.stat-item {
  padding: 24px 20px;
  text-align: center;
  border-right: 1px solid var(--subtle);
}
.stat-item:last-child { border-right: none; }

.stat-num {
  font-family: var(--font-serif);
  font-size: 2rem;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ═══════════════════════════════════════════
   SECTION SHARED
═══════════════════════════════════════════ */
.section { padding: var(--section-gap) 0; border-top: 1px solid var(--subtle); }

.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 48px;
}

.section-label {
  font-size: 0.75rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.section-link {
  font-size: 0.85rem;
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--subtle);
  padding-bottom: 1px;
  transition: border-color 0.2s;
}
.section-link:hover { border-color: var(--ink); }

/* ═══════════════════════════════════════════
   RESEARCH GRID
═══════════════════════════════════════════ */
.research-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2px;
  background: var(--subtle);
  border: 1px solid var(--subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.research-card {
  background: var(--surface);
  padding: 44px 40px;
  position: relative;
  transition: background 0.2s;
}
.research-card:hover { background: #fdfcfa; }

.research-card.featured {
  background: var(--ink);
  color: #fff;
}
.research-card.featured:hover { background: #1a1a1a; }
.research-card.featured p { color: rgba(255,255,255,0.65); }
.research-card.featured .card-link { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.2); }

.card-index {
  font-family: var(--font-serif);
  font-size: 0.8rem;
  color: var(--accent2);
  margin-bottom: 20px;
  letter-spacing: 0.06em;
}

.research-card h3 {
  font-family: var(--font-serif);
  font-size: 1.25rem;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 14px;
  color: inherit;
}

.research-card p {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--muted);
  margin-bottom: 28px;
}

.card-link {
  font-size: 0.8rem;
  letter-spacing: 0.04em;
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--subtle);
  padding-bottom: 1px;
  transition: border-color 0.2s;
}
.card-link:hover { border-color: currentColor; }

/* ═══════════════════════════════════════════
   WRITING LIST
═══════════════════════════════════════════ */
.writing-list {
  display: flex;
  flex-direction: column;
}

.writing-row {
  display: grid;
  grid-template-columns: 80px 1fr 20px;
  align-items: center;
  gap: 24px;
  padding: 22px 0;
  border-bottom: 1px solid var(--subtle);
  text-decoration: none;
  color: var(--ink);
  transition: padding-left 0.2s;
}
.writing-row:hover { padding-left: 8px; }
.writing-row:first-child { border-top: 1px solid var(--subtle); }

.writing-date {
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.writing-title {
  font-family: var(--font-serif);
  font-size: 1.05rem;
  line-height: 1.35;
}

.writing-arrow {
  color: var(--muted);
  font-size: 0.9rem;
  transition: transform 0.2s;
}
.writing-row:hover .writing-arrow { transform: translateX(4px); }

/* ═══════════════════════════════════════════
   NOW SECTION
═══════════════════════════════════════════ */
.now-card {
  display: grid;
  grid-template-columns: 1fr 0.5fr;
  gap: 64px;
  background: var(--surface);
  border: 1px solid var(--subtle);
  border-radius: var(--radius-lg);
  padding: 56px;
}

.now-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 1.15rem;
  line-height: 1.65;
  color: var(--ink);
  margin: 16px 0 20px;
}

.now-updated {
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.now-right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 28px;
  border-left: 1px solid var(--subtle);
  padding-left: 48px;
}

.now-item-label {
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.now-item-val {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--ink);
}

/* ═══════════════════════════════════════════
   ARTICLE / NOTES PAGES
═══════════════════════════════════════════ */
.post-header {
  border-bottom: 1px solid var(--subtle);
  padding-bottom: 40px;
  margin-bottom: 48px;
}

.post-title {
  font-family: var(--font-serif) !important;
  font-size: clamp(1.8rem, 4vw, 2.8rem) !important;
  font-weight: 400 !important;
  line-height: 1.2 !important;
  letter-spacing: -0.02em !important;
  color: var(--ink) !important;
}

.post-meta {
  font-size: 0.8rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted) !important;
  margin-top: 16px !important;
}

.post-content {
  font-size: 1.05rem;
  line-height: 1.85;
  color: #1a1a1a;
}

.post-content h2 {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 400;
  margin: 2.5em 0 0.8em;
  color: var(--ink);
}

.post-content h3 {
  font-family: var(--font-serif);
  font-size: 1.15rem;
  font-weight: 400;
  margin: 2em 0 0.6em;
  color: var(--ink);
}

.post-content blockquote {
  border-left: 3px solid var(--accent2);
  padding-left: 24px;
  margin: 2em 0;
  font-style: italic;
  color: var(--muted);
}

.post-content code {
  background: var(--subtle);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.88em;
}

/* ═══════════════════════════════════════════
   LIST PAGES (Research / Publications)
═══════════════════════════════════════════ */
.list-container {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 80px 40px;
}

.list-page-title {
  font-family: var(--font-serif) !important;
  font-size: clamp(2.5rem, 5vw, 4rem) !important;
  font-weight: 400 !important;
  letter-spacing: -0.02em !important;
  color: var(--ink) !important;
  margin-bottom: 64px !important;
  border-bottom: 1px solid var(--subtle);
  padding-bottom: 32px;
}

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
.footer {
  border-top: 1px solid var(--subtle) !important;
  background: var(--bg) !important;
  padding: 40px !important;
  font-size: 0.78rem !important;
  letter-spacing: 0.04em;
  color: var(--muted) !important;
}

/* ═══════════════════════════════════════════
   ENTRY (list items) OVERRIDE
═══════════════════════════════════════════ */
.entry { border-bottom: 1px solid var(--subtle) !important; padding: 32px 0 !important; }
.entry-header h2 { font-family: var(--font-serif) !important; font-size: 1.25rem !important; font-weight: 400 !important; }
.entry-content { font-size: 0.9rem !important; color: var(--muted) !important; }

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 860px) {
  .home-container { padding: 0 20px; }
  .hero-body { grid-template-columns: 1fr; }
  .hero-name { font-size: 3.5rem; }
  .research-grid { grid-template-columns: 1fr; }
  .now-card { grid-template-columns: 1fr; gap: 32px; padding: 36px; }
  .now-right { border-left: none; border-top: 1px solid var(--subtle); padding-left: 0; padding-top: 28px; }
  .writing-row { grid-template-columns: 64px 1fr 16px; gap: 12px; }
  .stat-row { grid-template-columns: repeat(3,1fr); }
}

@media (max-width: 560px) {
  .hero { padding: 48px 0 64px; }
  .hero-actions { flex-direction: column; }
  .btn-primary, .btn-ghost { text-align: center; }
}
</style>
