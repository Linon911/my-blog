{{ define "main" }}

<h1>{{ .Title }}</h1>

<div class="pub-toolbar">

  <input
    id="search"
    type="text"
    placeholder="Search publications..."
  >

  <div class="pub-filters">
    <button onclick="filterType('all')">All</button>
    <button onclick="filterType('working-paper')">Working Papers</button>
    <button onclick="filterType('project')">Projects</button>
    <button onclick="filterType('conference')">Conference Papers</button>
  </div>

</div>

<div id="result-count"></div>

<div id="grid" class="pub-grid"></div>

{{ partial "scholar-db.html" . }}

<script>

const DB = window.PUB_DB || [];

let currentType = "all";
let currentQuery = "";

/* -------------------- */
/* Semantic Dictionary  */
/* -------------------- */

const semanticMap = {

  ip: [
    "intellectual property",
    "patent",
    "copyright",
    "law"
  ],

  trade: [
    "international trade",
    "export",
    "import",
    "economics"
  ],

  innovation: [
    "technology",
    "growth",
    "research"
  ],

  technology: [
    "tech",
    "transfer",
    "diffusion"
  ]
};

/* -------------------- */
/* Expand Search Terms  */
/* -------------------- */

function expandQuery(query){

  if(!query) return [];

  let words = query.toLowerCase().split(/\s+/);

  let expanded = [...words];

  words.forEach(word => {

    if(semanticMap[word]) {
      expanded.push(...semanticMap[word]);
    }

  });

  return [...new Set(expanded)];
}

/* -------------------- */
/* Combined Filtering   */
/* -------------------- */

function getFilteredData(){

  let data = [...DB];

  if(currentType !== "all"){

    data = data.filter(
      p => p.type === currentType
    );

  }

  if(currentQuery){

    let terms = expandQuery(currentQuery);

    data = data.filter(p => {

      let text = (

        (p.title || "") + " " +
        (p.area || "") + " " +
        (p.description || "") + " " +
        (p.summary || "") + " " +
        (p.status || "") + " " +
        (p.type || "") + " " +
        (p.keywords || []).join(" ")

      ).toLowerCase();

      return terms.some(
        term => text.includes(term)
      );

    });

  }

  return data;
}

/* -------------------- */
/* Render Cards         */
/* -------------------- */

function render(){

  const grid =
    document.getElementById("grid");

  const counter =
    document.getElementById("result-count");

  const data =
    getFilteredData();

  counter.innerHTML =
    `<p>${data.length} record(s)</p>`;

  if(data.length === 0){

    grid.innerHTML = `
      <div class="pub-empty">
        No publications found.
      </div>
    `;

    return;
  }

  grid.innerHTML = data.map(p => `

    <article class="pub-card">

      <div class="pub-type">
        ${p.type || ""}
      </div>

      <h3>
        <a href="${p.url}">
          ${p.title}
        </a>
      </h3>

      <div class="pub-meta">

        ${p.year || ""}

        ${p.area ? " · " + p.area : ""}

      </div>

      <div class="pub-status">
        ${p.status || ""}
      </div>

      <p class="pub-desc">
        ${p.summary || p.description || ""}
      </p>

    </article>

  `).join("");

}

/* -------------------- */
/* Search               */
/* -------------------- */

document
.getElementById("search")
.addEventListener("input", e => {

  currentQuery = e.target.value.trim();

  render();

});

/* -------------------- */
/* Filter               */
/* -------------------- */

function filterType(type){

  currentType = type;

  render();

}

/* -------------------- */
/* Init                 */
/* -------------------- */

render();

</script>

{{ end }}
