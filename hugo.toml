baseURL = "https://linon9ll.github.io/"
locale = "en-US"
title = "Povaka"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    lineNos = false
    guessSyntax = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env           = "production"
  title         = "Povaka"
  description   = "Researcher in International Trade, Intellectual Property & Law and Economics."
  author        = "Povaka"
  DateFormat    = "2006"
  defaultTheme  = "auto"
  disableThemeToggle = false

  # PaperMod display
  ShowReadingTime       = false
  ShowShareButtons      = false
  ShowPostNavLinks      = true
  ShowBreadCrumbs       = false
  ShowCodeCopyButtons   = true
  ShowWordCount         = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc            = true
  disableScrollToTop    = false
  comments              = false
  hidemeta              = true
  hideSummary           = true
  showtoc               = true
  tocopen               = false

  # Open Graph / Twitter Card
  images = ["/images/og-card.png"]

  [params.homeInfoParams]
    Title   = "Povaka"
    Content = "International Trade · Intellectual Property · Law & Economics"

  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/Linon9ll"

  [[params.socialIcons]]
    name = "email"
    url  = "mailto:your@email.com"

  # MathJax
  [params.math]
    enable = true

  # Schema.org
  [params.schema]
    publisherType = "Person"

[taxonomies]
  tag      = "tags"
  category = "categories"
  area     = "areas"

[menu]
  [[menu.main]]
    identifier = "research"
    name       = "Research"
    url        = "/research/"
    weight     = 10
  [[menu.main]]
    identifier = "publications"
    name       = "Publications"
    url        = "/publications/"
    weight     = 20
  [[menu.main]]
    identifier = "notes"
    name       = "Notes"
    url        = "/notes/"
    weight     = 30
  [[menu.main]]
    identifier = "reading"
    name       = "Reading"
    url        = "/reading/"
    weight     = 40
  [[menu.main]]
    identifier = "timeline"
    name       = "Timeline"
    url        = "/timeline/"
    weight     = 50
  [[menu.main]]
    identifier = "cv"
    name       = "CV"
    url        = "/cv/"
    weight     = 60
  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about/"
    weight     = 70

[outputs]
  home = ["HTML", "RSS", "JSON"]