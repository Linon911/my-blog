baseURL = "https://www.povaka.com/"
defaultContentLanguage = "en"
title = "Povaka"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
pagerSize = 10

############################

# Academic Site Metadata

############################

[params]

author = "Povaka"

description = "Research on Technology Transfer, Intellectual Property Protection, International Trade and Law & Economics."

keywords = [
"Technology Transfer",
"Intellectual Property",
"International Trade",
"Law and Economics",
"Innovation",
"Research"
]

defaultTheme = "light"

disableSpecial1stPost = true

ShowBreadCrumbs = true
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowReadingTime = true
ShowWordCount = true
ShowShareButtons = false

ShowToc = true
TocOpen = false

math = true

ShowSearchPage = true

############################

# Homepage

############################

[params.homeInfoParams]

Title = "Povaka"

Content = """
Researcher in International Trade, Intellectual Property and Law & Economics.

This website documents my research projects, academic writing, reading database and technical explorations.

Research Interests:

• Technology Transfer

• Intellectual Property Protection

• International Trade

• Law & Economics

• Innovation Policy
"""

